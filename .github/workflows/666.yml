name: 39版物理修复构建流水线 (V2修复版)

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: '选择构建分支'
        required: true
        default: 'main'

jobs:
  pixel-repair-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: 物理检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}

      - name: 配置 Java 17 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 安装 Android 构建工具链
        run: |
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner
          echo "工具链安装完成"

      - name: 下载并部署 Apktool 2.9.3
        run: |
          mkdir -p tools
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o tools/apktool.jar

      - name: 执行 39 版物理注入逻辑
        run: |
          # 给予脚本权限并修复 Windows 换行符
          chmod +x inject_fix.sh
          sed -i 's/\r$//' inject_fix.sh
          ./inject_fix.sh

      - name: 构建未签名 APK (Build)
        run: java -jar tools/apktool.jar b . -o unsigned.apk

      - name: 物理对齐 (Zipalign) - 修复覆盖冲突
        # 使用 -f 强制覆盖已存在文件，-p 提升内存加载效率
        run: zipalign -f -p -v 4 unsigned.apk aligned.apk

      - name: 执行 V2/V3 签名 (Apksigner)
        run: |
          # 物理清理旧签名文件
          rm -f debug.keystore build_output.apk
          
          # 自动生成临时签名证书
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # 签署 APK
          apksigner sign --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --out build_output.apk aligned.apk
          
          # 物理校验
          apksigner verify --verbose build_output.apk

      - name: 提交并推送到代码库
        run: |
          git config --global user.email "bot@pixel-repair.org"
          git config --global user.name "BruteForceBot"
          git add .
          git diff-index --quiet HEAD || git commit -m "39版修复：物理对齐与逻辑注入完成"
          git push origin ${{ github.event.inputs.target_branch }}

      - name: 发布最终产物
        uses: actions/upload-artifact@v4
        with:
          name: Cracked_v39_Fixed_APK
          path: build_output.apk
