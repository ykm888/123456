name: 34 版云端暴力破解工作流

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: '目标分支'
        required: true
        default: 'main'

jobs:
  pixel-repair:
    runs-on: ubuntu-latest
    steps:
      - name: 物理检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}

      - name: 静默审计与全量暴力修复
        run: |
          echo "开始执行 34 版物理暴力修复..."

          # 1. 物理致盲：CrashHandler (36 版：使用最稳健的追加模式)
          CRASH_HANDLER=$(find . -name "CrashHandler.smali" | head -n 1)
          if [ ! -z "$CRASH_HANDLER" ]; then
            echo "注入 CrashHandler: $CRASH_HANDLER"
            # 找到 .locals 行并在其后插入 return-void
            sed -i '/.locals/a \    return-void' "$CRASH_HANDLER"
          fi

          # 2. 暴力注入：SharedPreferencesView (36 版：彻底修复 sed 语法歧义)
          PREFS_VIEW=$(find . -name "SharedPreferencesView.smali" | head -n 1)
          if [ ! -z "$PREFS_VIEW" ]; then
            echo "注入 SharedPreferencesView: $PREFS_VIEW"
            # 分步操作：先定位 getBoolean 方法区域，再在内部的 .locals 后注入
            # 使用更简单的范围匹配和追加方式
            sed -i '/.method public final getBoolean(Ljava/lang/String;Z)Z/,/.end method/ s/.locals.*/&\n    const\/4 v0, 0x1\n    return v0/' "$PREFS_VIEW"
          fi

          # 3. 像素级劫持：域名污染修复 (main.js)
          if [ -f "main.js" ]; then
            echo "注入 main.js 劫持逻辑"
            sed -i 's/gaosha.net/127.0.0.1/g' main.js
            sed -i 's/gaosha.com/127.0.0.1/g' main.js
          fi

          # 4. 暴力清理：针对常见的 Signatrue 校验类进行返回拦截
          grep -rl "checkSignature" . --include="*.smali" | xargs -I {} sed -i '/.method.*checkSignature/,/return/ s/return.*/const\/4 v0, 0x1\n    return v0/g' {} || true

      - name: 验证修复成果
        run: |
          echo "检查注入状态..."
          grep -r "const/4 v0, 0x1" . || echo "警告：部分注入可能未匹配成功"

      - name: 物理提交并推送到仓库
        run: |
          git config --global user.email "bot@pixel-repair.org"
          git config --global user.name "BruteForceBot"
          git add .
          git diff-index --quiet HEAD || git commit -m "34 版物理修复：采用 36 版安全注入语法修复 sed 错误"
          git push origin ${{ github.event.inputs.target_branch }}
