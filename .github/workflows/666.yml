name: 39版增强型 APK 自动化构建

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: '分支选择'
        required: true
        default: 'main'

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    steps:
      - name: 检出物理代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 安装物理对齐与签名工具
        run: sudo apt-get update && sudo apt-get install -y zipalign apksigner

      - name: 下载并配置 Apktool 2.9.3
        run: |
          mkdir -p tools
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o tools/apktool.jar

      - name: 运行物理注入脚本
        run: |
          chmod +x inject_ui_fix.sh
          # 先清理行尾符再执行，确保 100% 成功
          sed -i 's/\r$//' inject_ui_fix.sh
          ./inject_ui_fix.sh

      - name: 回编译 APK (Build)
        run: java -jar tools/apktool.jar b . -o original_unsigned.apk

      - name: 4字节对齐 (Zipalign)
        # 这是防止闪退的关键步骤，未对齐的应用会被 Android 系统强杀
        run: zipalign -v 4 original_unsigned.apk aligned.apk

      - name: 执行 V2 签名 (Apksigner)
        run: |
          # 动态生成签名文件
          keytool -genkey -v -keystore release.keystore -alias build_key -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android,O=Google,C=US" -storepass android -keypass android
          # 签名并验证
          apksigner sign --ks release.keystore --ks-key-alias build_key --ks-pass pass:android --key-pass pass:android --out final_work.apk aligned.apk
          apksigner verify final_work.apk

      - name: 导出产物
        uses: actions/upload-artifact@v4
        with:
          name: Fixed_39_APK
          path: final_work.apk
