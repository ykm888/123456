name: HA-APK 自动化修复与构建

on:
  workflow_dispatch: # 手动触发
  push:
    branches: [ main ] # 当你更新 ha.apk 时自动触发

jobs:
  pixel-auto-repair:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 物理检出代码 (获取 ha.apk)
        uses: actions/checkout@v4

      - name: 2. 配置 Java 17 逆向环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. 安装物理工具链 (Apktool/Zipalign/Apksigner)
        run: |
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner
          mkdir -p tools
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o tools/apktool.jar

      - name: 4. 自动解包 ha.apk
        run: |
          if [ -f "ha.apk" ]; then
            java -jar tools/apktool.jar d ha.apk -o ha_workdir
          else
            echo "错误：未在根目录找到 ha.apk"
            exit 1
          fi

      - name: 5. 执行 39 版物理修复 (内嵌手术刀脚本)
        run: |
          cd ha_workdir
          echo "--- 启动启发式自动化修复 ---"

          # [修复 A]：精准注入权限控制类
          TARGET=$(find . -name "SharedPreferencesView.smali" | head -n 1)
          if [ -n "$TARGET" ]; then
              echo "命中权限类: $TARGET"
              # 强行返回 True (VIP 开启)
              sed -i '/.method public final getBoolean(Ljava\/lang\/String;Z)Z/,/.end method/ s/.locals [0-9]*/.locals 1\n    const\/4 v0, 0x1\n    return v0/g' "$TARGET"
              # 强行返回 VIP 字符串
              sed -i '/.method public final getString(Ljava\/lang\/String;Ljava\/lang\/String;)Ljava\/lang\/String;/,/.end method/ s/.locals [0-9]*/.locals 1\n    const-string v0, "VIP"\n    return-object v0/g' "$TARGET"
          fi

          # [修复 B]：通用签名校验绕过 (防止闪退)
          # 寻找所有 checkSignature 方法并强制返回 1 (True)
          grep -rl "checkSignature" . --include="*.smali" | xargs -I {} sed -i '/.method.*checkSignature/,/.end method/ s/return v0/const\/4 v0, 0x1\n    return v0/g' {} || true

          # [修复 C]：物理致盲 CrashHandler (防止报错退出)
          CRASH=$(find . -name "CrashHandler.smali" | head -n 1)
          if [ -n "$CRASH" ]; then
              LINE=$(grep -n ".locals" "$CRASH" | head -n 1 | cut -d: -f1)
              sed -i "${LINE}a \    return-void" "$CRASH"
          fi

          # [修复 D]：域名劫持
          [ -f "assets/project/project.json" ] && sed -i 's/gaosha\.net/127.0.0.1/g' "assets/project/project.json"

          echo "--- 物理修复完成 ---"

      - name: 6. 回编译为未签名 APK
        run: java -jar tools/apktool.jar b ha_workdir -o unsigned.apk

      - name: 7. 物理对齐 (Zipalign)
        # -f 强制覆盖，-p 解决 Android 11+ 加载闪退
        run: zipalign -f -p -v 4 unsigned.apk aligned.apk

      - name: 8. 执行全量签名 (Apksigner)
        run: |
          # 生成临时签名证书
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android,O=Repair,C=US"
          # 签署最终产物
          apksigner sign --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --out ha_fixed_v39.apk aligned.apk
          # 物理校验
          apksigner verify --verbose ha_fixed_v39.apk

      - name: 9. 上传修复后的成品
        uses: actions/upload-artifact@v4
        with:
          name: Fixed_HA_Package
          path: ha_fixed_v39.apk
