name: AutoJS-APK 终极自愈构建

on:
  workflow_dispatch:
  push:
    paths:
      - 'ha.apk'

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 初始化环境 (Java 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. 安装逆向工具链
        run: |
          sudo apt-get update && sudo apt-get install -y zipalign apksigner
          mkdir -p tools
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o tools/apktool.jar

      - name: 4. 反编译 (核心：-r 保持资源原始状态)
        run: java -jar tools/apktool.jar d -r ha.apk -o ha_workdir -f

      - name: 5. 执行“方法重写”注入 (解决编译报错)
        run: |
          cd ha_workdir
          echo "--- 启动精准手术 ---"

          # [A] 修复权限类：直接替换整个方法块 (解决寄存器冲突)
          TARGET=$(find . -name "SharedPreferencesView.smali" | head -n 1)
          if [ -n "$TARGET" ]; then
              echo "重写权限类: $TARGET"
              # 强行重写 getBoolean，确保 locals 只有 1 个，逻辑只有 return true
              sed -i '/.method public final getBoolean(Ljava\/lang\/String;Z)Z/,/.end method/c \.method public final getBoolean(Ljava/lang/String;Z)Z\n    .locals 1\n    const/4 v0, 0x1\n    return v0\n.end method' "$TARGET"
              
              # 强行重写 getString，直接返回 "VIP"
              sed -i '/.method public final getString(Ljava\/lang\/String;Ljava\/lang\/String;)Ljava\/lang\/String;/,/.end method/c \.method public final getString(Ljava/lang/String;Ljava/lang/String;)Ljava/lang/String;\n    .locals 1\n    const-string v0, "VIP"\n    return-object v0\n.end method' "$TARGET"
          fi

          # [B] 修复 AppUtils 签名报错点
          # 我们不再使用 const-object v0, v1，而是直接劫持 equals 比对结果
          # 寻找业务代码中的 equals 比对，强制让其返回 1 (true)
          # 避开系统类库，只修改业务逻辑
          find . -type f -name "*.smali" ! -path "./smali/androidx/*" ! -path "./smali/android/*" | xargs grep -l "Ljava/lang/String;->equals" | xargs -I {} bash -c '
            echo "劫持比对逻辑: {}"
            # 将 move-result v0 (比对结果) 强制修正为 const/4 v0, 0x1
            sed -i "s/move-result v0/move-result v0\n    const\/4 v0, 0x1/g" {}
          ' || true

          # [C] 物理屏蔽 System.exit (防秒退)
          # 使用 nop (空指令) 填充，不破坏指令流长度
          grep -rl "Ljava/lang/System;->exit" . --include="*.smali" | xargs -I {} \
            sed -i "s/invoke-static {.*}, Ljava\/lang\/System;->exit(I)V/nop/g" {} || true

          # [D] 针对 Auto.js 的特殊屏蔽 (劫持 project.json 域名)
          find . -name "*.json" | xargs sed -i 's/gaosha\.net/127.0.0.1/g' 2>/dev/null || true

          echo "--- 注入完成 ---"

      - name: 6. 回编译 APK (启用 AAPT2)
        run: java -jar tools/apktool.jar b ha_workdir -o unsigned.apk --use-aapt2

      - name: 7. 物理对齐 (解决 11+ 闪退)
        run: |
          rm -f aligned.apk
          zipalign -f -p -v 4 unsigned.apk aligned.apk

      - name: 8. 执行全量签名 (V1/V2/V3)
        run: |
          rm -f debug.keystore ha_final.apk
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android,O=Repair,C=US"
          apksigner sign --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --out ha_final.apk aligned.apk

      - name: 9. 发布最终成品
        uses: actions/upload-artifact@v4
        with:
          name: HA_Fixed_Ultimate
          path: ha_final.apk
