name: HA-APK 终极自动化修复流水线

on:
  workflow_dispatch:
  push:
    paths:
      - 'ha.apk'

jobs:
  ultimate-build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出仓库代码
        uses: actions/checkout@v4

      - name: 2. 初始化 Java 17 逆向环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. 安装 Android 物理工具链
        run: |
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner
          mkdir -p tools
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o tools/apktool.jar

      - name: 4. 自动解包 ha.apk
        run: |
          if [ -f "ha.apk" ]; then
            # 使用 --baksmali 参数确保反编译逻辑最清晰
            java -jar tools/apktool.jar d ha.apk -o ha_workdir -f
          else
            echo "❌ 错误：未在根目录找到 ha.apk"
            exit 1
          fi

      - name: 5. 执行内嵌物理注入 (解决闪退核心逻辑)
        run: |
          cd ha_workdir
          echo "--- 启动手术刀注入 ---"

          # [修复 A] 精准权限注入 (不破坏其他逻辑)
          TARGET=$(find . -name "SharedPreferencesView.smali" | head -n 1)
          if [ -n "$TARGET" ]; then
              echo "命中目标类: $TARGET"
              # 强制 getBoolean 返回 true (0x1) 并自动修正寄存器
              sed -i '/.method public final getBoolean(Ljava\/lang\/String;Z)Z/,/.end method/ s/.locals [0-9]*/.locals 1\n    const\/4 v0, 0x1\n    return v0/g' "$TARGET"
              # 强制 getString 返回 "VIP"
              sed -i '/.method public final getString(Ljava\/lang\/String;Ljava\/lang\/String;)Ljava\/lang\/String;/,/.end method/ s/.locals [0-9]*/.locals 1\n    const-string v0, "VIP"\n    return-object v0/g' "$TARGET"
          fi

          # [修复 B] 签名校验绕过 (防止闪退的主力)
          # 扫描所有可能的校验点，统一返回 1 (true)
          grep -rl "checkSignature" . --include="*.smali" | xargs -I {} sed -i '/.method.*checkSignature/,/.end method/ s/return v0/const\/4 v0, 0x1\n    return v0/g' {} || true

          # [修复 C] 域名屏蔽
          [ -f "assets/project/project.json" ] && sed -i 's/gaosha\.net/127.0.0.1/g' "assets/project/project.json"

          echo "--- 注入完成 ---"

      - name: 6. 回编译为 APK (强制忽略资源错误)
        run: |
          # 如果 app 闪退严重，尝试在这一步加入 -r 参数（不反编译资源）
          java -jar tools/apktool.jar b ha_workdir -o unsigned.apk

      - name: 7. 物理对齐 (解决 Zipalign 报错)
        run: |
          # 核心修复：-f 强制覆盖旧文件，-p 解决高版本闪退
          rm -f aligned.apk
          zipalign -f -p -v 4 unsigned.apk aligned.apk

      - name: 8. 执行签名 (解决 Keytool 别名冲突)
        run: |
          # 核心修复：先删除旧证书防止 alias already exists
          rm -f debug.keystore ha_fixed_final.apk
          
          # 生成全新证书
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android,O=Repair,C=US"
          
          # 执行 V2/V3 签名
          apksigner sign --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --out ha_fixed_final.apk aligned.apk
          
          # 物理校验签名
          apksigner verify --verbose ha_fixed_final.apk

      - name: 9. 发布最终成品 APK
        uses: actions/upload-artifact@v4
        with:
          name: Fixed_HA_Package_Final
          path: ha_fixed_final.apk
