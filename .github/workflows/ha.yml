name: HA-APK 极限兼容修复版 (防闪退专用)

on:
  workflow_dispatch:
  push:
    paths:
      - 'ha.apk'

jobs:
  extreme-repair:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 初始化环境 (Java 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. 安装物理工具链
        run: |
          sudo apt-get update && sudo apt-get install -y zipalign apksigner
          mkdir -p tools
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o tools/apktool.jar

      - name: 4. 强制解包 (关键：使用 -r 忽略资源解析)
        # 使用 -r 参数：不反编译资源文件。这是解决 UI 崩溃、资源 ID 错误的最强手段
        run: java -jar tools/apktool.jar d -r ha.apk -o ha_workdir -f

      - name: 5. 注入“静默修复”逻辑
        run: |
          cd ha_workdir
          echo "--- 正在执行微创手术 ---"

          # [修复 A] 劫持 SharedPreferences 逻辑 (卡密本地缓存点)
          TARGET=$(find . -name "SharedPreferencesView.smali" | head -n 1)
          if [ -n "$TARGET" ]; then
              # 仅修改返回值，不改变寄存器结构，防止堆栈崩溃
              sed -i '/.method public final getBoolean(Ljava\/lang\/String;Z)Z/,/.end method/ s/return v0/const\/4 v0, 0x1\n    return v0/g' "$TARGET"
              sed -i '/.method public final getString(Ljava\/lang\/String;Ljava\/lang\/String;)Ljava\/lang\/String;/,/.end method/ s/return-object v0/const-string v0, "VIP"\n    return-object v0/g' "$TARGET"
          fi

          # [修复 B] 针对“秒退”的签名绕过补丁 (防自校验)
          # 扫描代码中所有可能导致退出的 System.exit, finish, killProcess
          grep -rlE "System;->exit|Activity;->finish|Process;->killProcess" . --include="*.smali" | xargs -I {} sed -i 's/return-void/return-void\n    # /g' {} || true

          # [修复 C] 卡密输入框“万能通过”
          # 寻找比对函数，强制通过
          grep -rl "Ljava/lang/String;->equals" . --include="*.smali" | xargs -I {} sed -i 's/if-eqz v0/if-nez v0/g' {} || true

          echo "--- 手术完成 ---"

      - name: 6. 重新回编译 (启用 AAPT2 兼容模式)
        # 使用 --use-aapt2 确保资源打包逻辑与现代 Android 一致
        run: java -jar tools/apktool.jar b ha_workdir -o unsigned.apk --use-aapt2

      - name: 7. 物理对齐 (核心：对齐 resources.arsc)
        run: |
          rm -f aligned.apk
          # -p 必须加，解决 Android 11+ 闪退
          zipalign -f -p -v 4 unsigned.apk aligned.apk

      - name: 8. 执行签名 (使用官方 apksigner)
        run: |
          rm -f debug.keystore ha_fixed_pro.apk
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android,O=Google,C=US"
          # 使用 V2/V3 签名，这是绕过系统包管理器检测的关键
          apksigner sign --v1-signing-enabled true --v2-signing-enabled true --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --out ha_fixed_pro.apk aligned.apk

      - name: 9. 发布最终成果
        uses: actions/upload-artifact@v4
        with:
          name: Pro_Repair_NoCrash_APK
          path: ha_fixed_pro.apk
