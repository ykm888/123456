name: HA-APK 影子修复版 (绝对不闪退)

on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出
        uses: actions/checkout@v4

      - name: 2. 准备工具
        run: |
          sudo apt-get update && sudo apt-get install -y zipalign apksigner
          mkdir -p tools
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o tools/apktool.jar

      - name: 3. 物理级反编译 (核心：-r 保护代码)
        # 只要带了 -r，classes.dex 就不会被反编译，也就保证了打包后哈希值不变
        run: java -jar tools/apktool.jar d -r ha.apk -o ha_workdir -f

      - name: 4. 执行“资产层”深度注入
        run: |
          cd ha_workdir
          echo "--- 正在对资产文件执行全量伪装 ---"

          # [A] 暴力覆盖 assets 下所有 JSON/JS 文件的权限标记
          # 哪怕是加密脚本，里面的字符串常量（如 false, 0）通常也是明文
          find assets -type f | xargs -I {} bash -c '
            sed -i "s/false/true/g" {} 2>/dev/null
            sed -i "s/:0/:9/g" {} 2>/dev/null
            sed -i "s/\"is_vip\":0/\"is_vip\":1/g" {} 2>/dev/null
            sed -i "s/\"activated\":false/\"activated\":true/g" {} 2>/dev/null
            # 暴力把所有日期格式替换为 2099 年
            sed -i "s/[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}/2099-12-31/g" {} 2>/dev/null
          ' || true

          # [B] 针对 project.json 的核心注入
          # Auto.js 应用必读此文件，我们强行改写内部权限
          find assets -name "project.json" | xargs sed -i 's/"is_vip": false/"is_vip": true/g' 2>/dev/null || true
          find assets -name "project.json" | xargs sed -i 's/"activated": false/"activated": true/g' 2>/dev/null || true

          # [C] 域名劫持 (字符串替换通常不会引起 Dex 崩溃)
          # 注意：即使在 -r 模式下，非代码区的字符串也可以尝试替换
          grep -rl "gaosha.net" . | xargs sed -i 's/gaosha\.net/127.0.0.1/g' 2>/dev/null || true

          echo "--- 注入完成 ---"

      - name: 5. 重构 (使用 AAPT2)
        run: java -jar tools/apktool.jar b ha_workdir -o unsigned.apk --use-aapt2

      - name: 6. 物理页面对齐
        run: zipalign -f -p -v 4 unsigned.apk aligned.apk

      - name: 7. 执行强力签名
        run: |
          rm -f debug.keystore
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android,O=Repair,C=US"
          apksigner sign --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --out ha_shadow_fixed.apk aligned.apk

      - name: 8. 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: Shadow_Fixed_APK
          path: ha_shadow_fixed.apk
