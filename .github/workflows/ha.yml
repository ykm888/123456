name: HA-APK 精准修复版 (解决 Smali 语法错误)

on:
  workflow_dispatch:
  push:
    paths:
      - 'ha.apk'

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 初始化 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. 安装工具链
        run: |
          sudo apt-get update && sudo apt-get install -y zipalign apksigner
          mkdir -p tools
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o tools/apktool.jar

      - name: 4. 反编译 (不反编译资源)
        run: java -jar tools/apktool.jar d -r ha.apk -o ha_workdir -f

      - name: 5. 执行安全注入 (修正语法错误)
        run: |
          cd ha_workdir
          echo "--- 启动安全注入手术 ---"

          # [A] 精准权限注入：仅修改 SharedPreferencesView
          TARGET=$(find . -name "SharedPreferencesView.smali" | head -n 1)
          if [ -n "$TARGET" ]; then
              echo "修改权限类: $TARGET"
              # 在 .locals 声明后直接插入返回值，确保语法正确
              sed -i '/.method public final getBoolean(Ljava\/lang\/String;Z)Z/,/.end method/ s/return v0/const\/4 v0, 0x1\n    return v0/g' "$TARGET"
              sed -i '/.method public final getString(Ljava\/lang\/String;Ljava\/lang\/String;)Ljava\/lang\/String;/,/.end method/ s/return-object v0/const-string v0, "VIP"\n    return-object v0/g' "$TARGET"
          fi

          # [B] 安全的签名绕过：避开 androidx/google 等系统路径
          # 只在非系统目录下寻找 getPackageInfo
          find . -type f -name "*.smali" ! -path "./smali/androidx/*" ! -path "./smali/android/*" ! -path "./smali/com/google/*" | xargs grep -l "getPackageInfo" | xargs -I {} bash -c '
            echo "正在注入签名伪装: {}"
            # 找到 move-result-object 这一行，在它后面直接强行改写寄存器，不删除原逻辑以防破坏堆栈
            sed -i "/move-result-object v0/a \    const-object v0, v1" {}
          ' || true

          # [C] 暴力破解卡密比对点 (随便输都能进)
          # 修正 equals 的 sed 逻辑，确保只在 move-result v0 后修改
          find . -type f -name "*.smali" ! -path "./smali/androidx/*" | xargs grep -l "equals" | xargs -I {} \
            sed -i "s/move-result v0/const\/4 v0, 0x1/g" {} || true

          # [D] 物理擦除 System.exit (防自杀补丁)
          # 使用更温和的 nop 替换，不改变行数
          grep -rl "Ljava/lang/System;->exit" . --include="*.smali" | xargs -I {} \
            sed -i "s/invoke-static {.*}, Ljava\/lang\/System;->exit(I)V/nop/g" {} || true

          echo "--- 注入完成 ---"

      - name: 6. 回编译 APK
        run: java -jar tools/apktool.jar b ha_workdir -o unsigned.apk --use-aapt2

      - name: 7. 物理对齐
        run: |
          rm -f aligned.apk
          zipalign -f -p -v 4 unsigned.apk aligned.apk

      - name: 8. 执行签名
        run: |
          rm -f debug.keystore ha_fixed_v3.apk
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android,O=Repair,C=US"
          apksigner sign --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --out ha_fixed_v3.apk aligned.apk

      - name: 9. 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: Fixed_HA_V3
          path: ha_fixed_v3.apk
