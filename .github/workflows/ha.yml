name: HA-APK 终极彻底修复版

on:
  workflow_dispatch:
  push:
    paths:
      - 'ha.apk'

jobs:
  ultimate-repair:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 物理检出
        uses: actions/checkout@v4

      - name: 2. 环境初始化
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. 部署顶级逆向工具
        run: |
          sudo apt-get update && sudo apt-get install -y zipalign apksigner
          mkdir -p tools
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o tools/apktool.jar

      - name: 4. 零风险解包 (强制忽略资源)
        # 绝不反编译资源，这是彻底解决资源引发闪退的唯一路径
        run: java -jar tools/apktool.jar d -r ha.apk -o ha_workdir -f

      - name: 5. 执行“反自杀”与“万能登录”注入
        run: |
          cd ha_workdir
          echo "--- 启动底层逻辑重构 ---"

          # [A] 彻底抹除签名校验点 (Anti-Signature Kill)
          # 寻找并直接返回 true，让应用以为自己还是原版签名
          grep -rlE "checkSignature|verifySignature|getPackageInfo" . --include="*.smali" | xargs -I {} sed -i '/.method.*Z/,/.end method/ s/return v[0-9]*/const\/4 v0, 0x1\n    return v0/g' {} || true

          # [B] 精准劫持授权读取 (SharedPreferences)
          TARGET=$(find . -name "SharedPreferencesView.smali" | head -n 1)
          if [ -n "$TARGET" ]; then
              # 注入逻辑：强制返回 true (0x1) 并自动修正局部变量寄存器
              sed -i '/.method public final getBoolean(Ljava\/lang\/String;Z)Z/,/.end method/ s/.locals [0-9]*/.locals 1\n    const\/4 v0, 0x1\n    return v0/g' "$TARGET"
              sed -i '/.method public final getString(Ljava\/lang\/String;Ljava\/lang\/String;)Ljava\/lang\/String;/,/.end method/ s/.locals [0-9]*/.locals 1\n    const-string v0, "VIP"\n    return-object v0/g' "$TARGET"
          fi

          # [C] 暴力破解卡密比对点 (随便输都能进)
          # 寻找 equals 比对结果并强行翻转
          grep -rl "Ljava/lang/String;->equals" . --include="*.smali" | xargs -I {} sed -i 's/if-eqz v0/if-nez v0/g' {} || true

          # [D] 彻底拦截 System.exit (反自杀补丁)
          # 将所有退出指令替换为空操作，防止应用闪退退出
          grep -rl "System;->exit" . --include="*.smali" | xargs -I {} sed -i 's/invoke-static {.*}, Ljava\/lang\/System;->exit(I)V/nop/g' {} || true

          echo "--- 物理修复完成 ---"

      - name: 6. 使用 AAPT2 强制回编译
        run: java -jar tools/apktool.jar b ha_workdir -o unsigned.apk --use-aapt2

      - name: 7. 极致 4 字节页面对齐
        run: |
          rm -f aligned.apk
          # -v 4 确保所有资源按 4 字节对齐，-p 确保内存映射对齐
          zipalign -f -p -v 4 unsigned.apk aligned.apk

      - name: 8. 执行 V2/V3 强力签名
        run: |
          rm -f debug.keystore ha_ultimate_fixed.apk
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android,O=Google,C=US"
          # 同时启用 V1, V2, V3 签名，确保在任何安卓版本上都不会被系统拒载
          apksigner sign --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --out ha_ultimate_fixed.apk aligned.apk

      - name: 9. 导出产物
        uses: actions/upload-artifact@v4
        with:
          name: Ultimate_Fixed_APK
          path: ha_ultimate_fixed.apk
