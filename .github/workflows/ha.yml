name: HA-APK 终极兼容版 (解决解析包错误+强制断网)

on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v4

      - name: 2. 准备工具
        run: |
          sudo apt-get update && sudo apt-get install -y zipalign apksigner
          mkdir -p tools
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o tools/apktool.jar

      - name: 3. 物理隔离反编译 (核心：-r 参数)
        # 这一步绝对不解包 resources.arsc 和 AndroidManifest，保证系统能解析包
        run: java -jar tools/apktool.jar d -r ha.apk -o ha_workdir -f

      - name: 4. 执行“隐形”断网与资产注入
        run: |
          cd ha_workdir
          echo "--- 正在执行安全注入 ---"

          # [A] 协议原地屏蔽 (http/https -> null)
          # 注意：sed 只替换 4-5 个字符，不改变原始文件的字节位置，防闪退且不破坏解析
          grep -rl "http://" . | xargs sed -i 's/http:\/\//null:\/\//g' 2>/dev/null || true
          grep -rl "https://" . | xargs sed -i 's/https:\/\//nulls:\/\//g' 2>/dev/null || true
          
          # [B] IP 地址全量指向 0.0.0.0 (掐断所有 IP 直连)
          find . -type f | xargs sed -i -E 's/[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}/0.0.0.0/g' 2>/dev/null || true

          # [C] 资产层强行授权 (Assets)
          # 修改 assets 下的脚本文件不会导致解析包错误
          find assets -type f -name "*.json" | xargs -I {} bash -c '
            sed -i "s/false/true/g" {}
            sed -i "s/\"is_vip\":0/\"is_vip\":1/g" {}
            sed -i "s/\"activated\":false/\"activated\":true/g" {}
            sed -i "s/[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}/2099-12-31/g" {}
          ' || true

          echo "--- 注入完成 ---"

      - name: 5. 重构与 4K 页面对齐 (解决安装失败的关键)
        run: |
          java -jar tools/apktool.jar b ha_workdir -o unsigned.apk --use-aapt2
          # 这一步非常重要，清理并重新对齐
          zipalign -p -v 4 unsigned.apk aligned.apk

      - name: 6. 重新执行全协议签名 (V1+V2+V3+V4)
        run: |
          rm -f debug.keystore
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android,O=Repair,C=US"
          # 使用 apksigner 进行最高兼容性签名
          apksigner sign --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --out ha_fixed_installable.apk aligned.apk

      - name: 7. 上传
        uses: actions/upload-artifact@v4
        with:
          name: Fixed_Installable_APK
          path: ha_fixed_installable.apk
