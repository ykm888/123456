name: HA-APK 绝对断网版 (彻底切断 IP 连接)

on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出
        uses: actions/checkout@v4

      - name: 2. 初始化
        run: |
          sudo apt-get update && sudo apt-get install -y zipalign apksigner
          mkdir -p tools
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o tools/apktool.jar

      - name: 3. 物理隔离反编译 (-r 模式保护 DEX)
        run: java -jar tools/apktool.jar d -r ha.apk -o ha_workdir -f

      - name: 4. 执行“全协议”断网手术
        run: |
          cd ha_workdir
          echo "--- 正在物理掐断所有网络协议 ---"

          # [A] 协议头爆破：将 http/https 替换为非法字符
          # 这样即便它用 IP 访问 (如 http://1.2.3.4)，也会因为协议不支持而崩溃/报错
          # 我们在整个项目目录执行替换
          grep -rl "http://" . | xargs sed -i 's/http:\/\//null:\/\//g' 2>/dev/null || true
          grep -rl "https://" . | xargs sed -i 's/https:\/\//nulls:\/\//g' 2>/dev/null || true

          # [B] IP 地址模糊匹配替换
          # 针对可能的硬编码 IP (如 123.123.123.123) 执行批量屏蔽
          # 我们把所有看起来像 IP 的字符串都重定向到 0.0.0.0
          find . -type f -name "*" | xargs sed -i -E 's/[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}/0.0.0.0/g' 2>/dev/null || true

          # [C] 资产层强行“本地化”
          # 既然断网了，App 必须依赖 project.json 里的本地配置
          find assets -type f -name "project.json" | xargs sed -i 's/"is_vip": false/"is_vip": true/g' 2>/dev/null || true
          find assets -type f -name "project.json" | xargs sed -i 's/"activated": false/"activated": true/g' 2>/dev/null || true
          
          # [D] 暴力清除所有可能存在的备用域名
          grep -rl "net" . | xargs sed -i 's/\.net/\.lock/g' 2>/dev/null || true
          grep -rl "com" . | xargs sed -i 's/\.com/\.lock/g' 2>/dev/null || true

          echo "--- 物理断网完成 ---"

      - name: 5. 重构与 4K 对齐
        run: |
          java -jar tools/apktool.jar b ha_workdir -o unsigned.apk --use-aapt2
          zipalign -f -p -v 4 unsigned.apk aligned.apk

      - name: 6. 重新签名
        run: |
          rm -f debug.keystore
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android,O=Repair,C=US"
          apksigner sign --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --out ha_absolute_offline.apk aligned.apk

      - name: 7. 上传
        uses: actions/upload-artifact@v4
        with:
          name: Absolute_Offline_APK
          path: ha_absolute_offline.apk
