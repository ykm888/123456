name: HA-APK 终极安装修复版 (解决解析包错误)

on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v4

      - name: 2. 准备逆向工具
        run: |
          sudo apt-get update && sudo apt-get install -y zipalign apksigner
          mkdir -p tools
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o tools/apktool.jar

      - name: 3. 物理隔离反编译 (-r 模式)
        # 绝对不解包资源索引，保证清单文件原始完整，解决解析错误
        run: java -jar tools/apktool.jar d -r ha.apk -o ha_workdir -f

      - name: 4. 执行“静默”授权与断网
        run: |
          cd ha_workdir
          echo "--- 执行逻辑注入 ---"

          # [A] 协议屏蔽：将 http/https 替换为 null
          # 原地替换，不改变文件长度，不破坏 APK 结构
          grep -rl "http://" . | xargs sed -i 's/http:\/\//null:\/\//g' 2>/dev/null || true
          grep -rl "https://" . | xargs sed -i 's/https:\/\//nulls:\/\//g' 2>/dev/null || true
          
          # [B] Assets 脚本全量授权
          find assets -type f -name "*.json" | xargs -I {} bash -c '
            sed -i "s/false/true/g" {}
            sed -i "s/\"is_vip\":0/\"is_vip\":1/g" {}
            sed -i "s/\"activated\":false/\"activated\":true/g" {}
            sed -i "s/[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}/2099-12-31/g" {}
          ' || true

          echo "--- 注入完成 ---"

      - name: 5. 重新构架并执行 4K 对齐 (关键步)
        run: |
          java -jar tools/apktool.jar b ha_workdir -o unsigned.apk --use-aapt2
          # 彻底清理旧文件，确保 zipalign 成功执行
          rm -f aligned.apk
          zipalign -p -v 4 unsigned.apk aligned.apk

      - name: 6. 执行全协议强力签名 (V1+V2+V3)
        run: |
          rm -f debug.keystore
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android,O=Repair,C=US"
          # 使用 apksigner 开启全版本签名，解决 Android 11+ 的安装问题
          rm -f ha_fix_final.apk
          apksigner sign --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --out ha_fix_final.apk aligned.apk

      - name: 7. 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: Final_Install_Success
          path: ha_fix_final.apk
