name: HA-APK 万能卡密登录修复版

on:
  workflow_dispatch:
  push:
    paths:
      - 'ha.apk'

jobs:
  bypass-login:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 环境初始化 (Java 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. 安装逆向工具链
        run: |
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner
          mkdir -p tools
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o tools/apktool.jar

      - name: 4. 强制反编译 (覆盖模式)
        run: java -jar tools/apktool.jar d ha.apk -o ha_workdir -f

      - name: 5. 注入“万能卡密”破解逻辑
        run: |
          cd ha_workdir
          echo "--- 正在注入万能登录手术刀 ---"

          # [核心逻辑 A]：劫持字符串比对 (让 equals 永远返回 1)
          # 这样无论你输入什么，当它与正确卡密比对时，结果都是“一致”的
          grep -rl "Ljava/lang/String;->equals(Ljava/lang/Object;)Z" . --include="*.smali" | xargs -I {} sed -i 's/move-result v0/const\/4 v0, 0x1/g' {} || true

          # [核心逻辑 B]：劫持布尔验证函数
          # 寻找常见的验证返回点，强制改为 true (0x1)
          grep -rlE "checkKey|verifyCode|isLogin|isAuth" . --include="*.smali" | xargs -I {} sed -i '/.method.*Z/,/.end method/ s/return v[0-9]*/const\/4 v0, 0x1\n    return v0/g' {} || true

          # [核心逻辑 C]：强制 SharedPreferences 注入 (本地持久化激活)
          TARGET=$(find . -name "SharedPreferencesView.smali" | head -n 1)
          if [ -n "$TARGET" ]; then
              echo "注入持久化权限: $TARGET"
              # 注入 getBoolean 返回 1
              sed -i '/.method public final getBoolean(Ljava\/lang\/String;Z)Z/,/.end method/ s/.locals [0-9]*/.locals 1\n    const\/4 v0, 0x1\n    return v0/g' "$TARGET"
              # 注入 getString 返回 VIP
              sed -i '/.method public final getString(Ljava\/lang\/String;Ljava\/lang\/String;)Ljava\/lang\/String;/,/.end method/ s/.locals [0-9]*/.locals 1\n    const-string v0, "VIP"\n    return-object v0/g' "$TARGET"
          fi

          # [辅助逻辑 D]：域名劫持 (防止联网封禁)
          find . -name "*.smali" -o -name "*.json" | xargs sed -i 's/gaosha\.net/127.0.0.1/g' 2>/dev/null || true

          echo "--- 万能登录逻辑注入完成 ---"

      - name: 6. 回编译 APK
        run: java -jar tools/apktool.jar b ha_workdir -o unsigned.apk

      - name: 7. 4字节物理对齐 (解决闪退)
        run: |
          rm -f aligned.apk
          zipalign -f -p -v 4 unsigned.apk aligned.apk

      - name: 8. 执行 V2/V3 全量签名
        run: |
          rm -f debug.keystore ha_unlimited.apk
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android,O=Repair,C=US"
          apksigner sign --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --out ha_unlimited.apk aligned.apk

      - name: 9. 发布最终成品
        uses: actions/upload-artifact@v4
        with:
          name: Universal_Login_APK
          path: ha_unlimited.apk
