name: HA-APK 零动代码修复版 (防闪退核心)

on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出
        uses: actions/checkout@v4

      - name: 2. 初始化环境
        run: |
          sudo apt-get update && sudo apt-get install -y zipalign apksigner
          mkdir -p tools
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o tools/apktool.jar

      - name: 3. 反编译 (注意：不使用 -r 模式，我们需要碰资源)
        run: java -jar tools/apktool.jar d ha.apk -o ha_workdir -f

      - name: 4. 执行“非侵入式”修改
        run: |
          cd ha_workdir
          echo "--- 启动非侵入式修复 ---"

          # [A] 针对 Auto.js 的 project.json 注入
          # 很多 Auto.js 应用的权限是写在 assets/project.json 里的
          # 我们把里面的字段强行改为 true，而不动 dex 代码
          find assets -name "project.json" | xargs sed -i 's/"is_vip": false/"is_vip": true/g' 2>/dev/null || true
          find assets -name "project.json" | xargs sed -i 's/"activated": false/"activated": true/g' 2>/dev/null || true

          # [B] 物理劫持服务器域名 (让它连不上验证服务器)
          # 当连不上服务器时，很多 App 会走本地缓存逻辑
          find . -type f -name "*.smali" | xargs sed -i 's/gaosha\.net/127.0.0.1/g' || true

          # [C] 关键：移除清单文件中的“自启动”和“权限检查”服务
          # 有些闪退是因为重签名后，某些系统 Service 校验不通过导致的
          sed -i '/android:name=".*\.CheckingService"/d' AndroidManifest.xml || true

          echo "--- 修复完成 ---"

      - name: 5. 重构 APK (关键：使用 aapt2 保持对齐)
        run: java -jar tools/apktool.jar b ha_workdir -o unsigned.apk --use-aapt2

      - name: 6. 物理页面对齐 (4KB 对齐防止安卓 11+ 闪退)
        run: zipalign -f -p -v 4 unsigned.apk aligned.apk

      - name: 7. 执行 V2+V3 强力签名
        run: |
          rm -f debug.keystore
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android,O=Repair,C=US"
          apksigner sign --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --out ha_no_mod_fixed.apk aligned.apk

      - name: 8. 上传
        uses: actions/upload-artifact@v4
        with:
          name: No_Mod_Fixed_APK
          path: ha_no_mod_fixed.apk
